name: Deploy to Azure App Service (publish profile)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (including devDependencies for build)
        # @tailwindcss/postcss is a devDependency required at build time by Next.js.
        # npm ci --include=dev ensures it is installed even when NODE_ENV=production.
        run: npm ci --include=dev
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NODE_ENV: production

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip . \
            -x "*.git*" \
            -x ".env*" \
            -x "*.tsbuildinfo" \
            -x "next-env.d.ts" \
            -x ".next/cache/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8D30372E2B5A4661AA8CDFB4A74AFC2B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_42239FFFA4754B4A8B4706F056434722 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A47351D5F0C1463584DE8434655D1192 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wottacore-ankit'
          slot-name: 'Production'
          package: release.zip
